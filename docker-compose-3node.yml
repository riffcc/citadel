# Citadel 3-Node Mesh Test
# Build: docker build -t citadel-lens:test -f citadel/Dockerfile . (from lagun-project dir)
# Run: docker compose -f citadel/docker-compose-3node.yml up

x-lens-node: &lens-node
  image: citadel-lens:test
  networks:
    - citadel-mesh
  restart: unless-stopped
  environment: &lens-env
    LENS_DATA_DIR: /data
    LENS_API_ADDR: 0.0.0.0:8080
    LENS_P2P_ADDR: 0.0.0.0:9000
    RUST_LOG: citadel_lens=debug,citadel_protocols=debug

services:
  # Genesis node - first to claim slot 0 (origin)
  genesis:
    <<: *lens-node
    hostname: genesis
    container_name: citadel-genesis
    environment:
      <<: *lens-env
      # Genesis has no peers initially
      CITADEL_PEERS: ""
    ports:
      - "8080:8080"
      - "9000:9000"
    volumes:
      - genesis-data:/data

  # Node 2 joins via genesis
  node2:
    <<: *lens-node
    hostname: node2
    container_name: citadel-node2
    environment:
      <<: *lens-env
      CITADEL_PEERS: genesis:9000
    ports:
      - "8081:8080"
      - "9001:9000"
    volumes:
      - node2-data:/data
    depends_on:
      - genesis

  # Node 3 joins via genesis
  node3:
    <<: *lens-node
    hostname: node3
    container_name: citadel-node3
    environment:
      <<: *lens-env
      CITADEL_PEERS: genesis:9000
    ports:
      - "8082:8080"
      - "9002:9000"
    volumes:
      - node3-data:/data
    depends_on:
      - genesis

networks:
  citadel-mesh:
    driver: bridge

volumes:
  genesis-data:
  node2-data:
  node3-data:

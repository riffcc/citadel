app = "citadel-live"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  LENS_DATA_DIR = "/data"
  LENS_API_BIND = "[::]:8080"
  LENS_P2P_BIND = "[::]:9000"
  RUST_LOG = "lens_node=info,citadel_lens=info"
  CITADEL_PEERS = "109.105.216.123:9000"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

# Switchboard — raw TCP, bypasses Fly's HTTP proxy.
# Mesh entry point: half-dial routing + Ygg peering on port 9443.
[[services]]
  protocol = "tcp"
  internal_port = 9443

  [[services.ports]]
    port = 9443

# UDP for TGP (mesh coordination)
[[services]]
  protocol = "udp"
  internal_port = 9000

  [[services.ports]]
    port = 9000

[[vm]]
  size = "shared-cpu-1x"
  memory = 256

[mounts]
  source = "citadel_data"
  destination = "/data"

[checks]
  [checks.health]
    port = 8080
    type = "http"
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

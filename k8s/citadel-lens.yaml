---
# Citadel Lens Mesh Deployment
# Deploy: kubectl apply -f citadel-500.yaml
# Scale:  kubectl scale deployment citadel-mesh --replicas=500

apiVersion: v1
kind: Namespace
metadata:
  name: citadel
---
apiVersion: v1
kind: Service
metadata:
  name: citadel-mesh
  namespace: citadel
spec:
  clusterIP: None  # Headless for peer discovery
  selector:
    app: citadel-lens
  ports:
    - name: api
      port: 8080
      targetPort: 8080
    - name: p2p-tcp
      port: 9000
      targetPort: 9000
    - name: p2p-udp
      port: 9000
      targetPort: 9000
      protocol: UDP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: citadel-mesh
  namespace: citadel
  labels:
    app: citadel-lens
spec:
  replicas: 50
  selector:
    matchLabels:
      app: citadel-lens
  template:
    metadata:
      labels:
        app: citadel-lens
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: lens-node
          image: riffcc/lens-node:v0.2.0-a1
          args:
            - --data-dir
            - /data
            - --peers
            - "5.78.147.14:9000,5.78.70.121:9000,116.203.235.87:9000,37.27.220.204:9000"
            - --admin-key
            - "ed25519p/4ca9ba8ac59d18a276bafd50a74a2b6ed83bd6d8a0066825b1eb9f98b3bcaa3a"
          ports:
            - containerPort: 8080
              name: api
            - containerPort: 9000
              name: p2p-tcp
            - containerPort: 9000
              name: p2p-udp
              protocol: UDP
          env:
            - name: RUST_LOG
              value: "citadel_lens=info,citadel_protocols=info"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: data
          emptyDir: {}
---
# Optional: Expose one node for external API access
apiVersion: v1
kind: Service
metadata:
  name: citadel-api
  namespace: citadel
spec:
  type: ClusterIP
  selector:
    app: citadel-lens
  ports:
    - name: api
      port: 8080
      targetPort: 8080

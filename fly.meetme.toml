app = "citadel-meetme"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  LENS_DATA_DIR = "/data"
  LENS_API_BIND = "[::]:8080"
  LENS_P2P_BIND = "[::]:9000"
  RUST_LOG = "lens_node=info,citadel_lens=info"
  # No entry peers — this IS the entry peer for the mesh
  CITADEL_PEERS = ""

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

# Switchboard — the only port mesh nodes need
[[services]]
  protocol = "tcp"
  internal_port = 9443

  [[services.ports]]
    port = 9443

[[vm]]
  size = "shared-cpu-1x"
  memory = 256

[mounts]
  source = "meetme_data"
  destination = "/data"

[checks]
  [checks.health]
    port = 8080
    type = "http"
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health"
